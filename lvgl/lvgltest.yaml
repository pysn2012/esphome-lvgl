---
substitutions:
  name: esp32-s3-box-3
  friendly_name: ESP32 S3 Box 3

  # 允许显示的字符集。此列表非常庞大，包含了多语言字符。
  allowed_characters: |-
    测试一二三四五六七八九十百千万亿温度湿电压·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?
  
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0  # 要求的最低ESPHome版本
  name_add_mac_suffix: true  # 设备名后缀添加MAC地址，避免冲突
  on_boot:  # 开机启动逻辑
    priority: 600
    then:
      - light.turn_on: led  # 开机点亮屏幕

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

api:

ota:
  - platform: esphome

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 20                        # 字号：24
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错

# 屏幕背光控制 (GPIO47)
output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

# 传感器
sensor:
  - platform: aht10
    i2c_id: bus_b
    variant: AHT20
    temperature:
      name: "S3 Temperature"
      id: s3temp
    humidity:
      name: "S3 Humidity"
    update_interval: 60s

  - platform: adc
    pin: GPIO10
    id: battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: "voltage"
    entity_category: "diagnostic"
    disabled_by_default: true
    update_interval: 30s
    attenuation: auto
    filters:
      - multiply: 4.11

  - platform: copy
    id: battery_percent
    source_id: battery_voltage
    name: "Battery level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: "battery"
    entity_category: "diagnostic"
    filters:
      - lambda: return (x - 2.7) / (4.2 - 2.7) * 100;
      - clamp:
          min_value: 0
          max_value: 100

  - platform: wifi_signal
    name: "WiFi db"
    id: wifi_signal_db
    update_interval: 30s

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal"
    id: wifi_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"

# I2C总线 (用于触摸屏等)
i2c:
  - id: bus_a
    scl: GPIO18
    sda: GPIO8
  - id: bus_b
    sda: GPIO41
    scl: GPIO40

# SPI总线 (用于驱动屏幕)
spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

# 显示屏 (Display): 配置ILI9XXX系列屏幕（S3BOX型号）
display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    auto_clear_enabled: false

# 触摸屏
touchscreen:
  - platform: gt911
    i2c_id: bus_a
    address: 0x5D
    id: gt911_touchscreen
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true

# LVGL 配置
lvgl:
  displays:
    - s3_box_lcd
  update_when_display_idle: true
  default_font: cn_font

  pages:
    - id: main_page
      bg_color: 0x1A1A2E
      layout:
        type: grid
        grid_rows: [ 80px, FR(1), FR(1) ]
        grid_columns: [ FR(1), FR(1) ]
        pad_row: 12px
        pad_column: 12px
      widgets:
        # --- 标题栏 ---
        - label:
            text: "BOX-3测试"
            text_font: cn_font
            text_color: 0xFFFFFF
            grid_cell_row_pos: 0
            grid_cell_column_pos: 0
            grid_cell_column_span: 2
            grid_cell_x_align: CENTER
            grid_cell_y_align: CENTER
            bg_color: 0x16213E
            radius: 8
            pad_all: 4px

        # --- 温度卡片 ---
        - obj:
            grid_cell_row_pos: 1
            grid_cell_column_pos: 0
            bg_color: 0x0F3460
            radius: 12
            pad_all: 12px
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 4px
            widgets:
              - label:
                  text: "温度"
                  text_color: 0xE94560
              - label:
                  id: device_temp
                  text: "25.1℃"
                  text_font: cn_font
                  text_color: 0xFFFFFF

        # --- 湿度卡片 ---
        - obj:
            grid_cell_row_pos: 1
            grid_cell_column_pos: 1
            bg_color: 0x0F3460
            radius: 12
            pad_all: 12px
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 4px
            widgets:
              - label:
                  text: "湿度"
                  text_color: 0x00D9FF
              - label:
                  id: device_humi
                  text: "60.0%"
                  text_font: cn_font
                  text_color: 0xFFFFFF