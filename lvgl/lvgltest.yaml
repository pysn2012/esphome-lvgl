---
substitutions:
  name: esp32-s3-box-3
  friendly_name: ESP32 S3 Box 3
  allowed_characters: |-
    зҺҜеўғз”өжұ жё©еәҰж№ҝеҺӢйҮҸВ·пјҒ@#пҝҘ%вҖҰ&*пјҲпјүвҖ”+-=гҖҒ|гҖҗ{}гҖ‘пјӣпјҡвҖҳвҖңвҖқпјҢгҖҠгҖӮгҖӢ/пјҹв„ғв„үпҝЎ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: true
  on_boot:
    priority: 600
    then:
      - light.turn_on: led

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

api:
ota:
  - platform: esphome
logger:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal:

font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: cn_font
    size: 20
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

sensor:
  - platform: aht10
    i2c_id: bus_b
    variant: AHT20
    temperature:
      name: "S3 Temperature"
      id: s3temp
      on_value:
        - lvgl.label.update:
            id: lbl_temp
            text:
              format: "жё©еәҰ: %.1fв„ғ"
              args: [ 'x' ]
    humidity:
      name: "S3 Humidity"
      id: s3humi
      on_value:
        - lvgl.label.update:
            id: lbl_humi
            text:
              format: "ж№ҝеәҰ: %.1f%%"
              args: [ 'x' ]
    update_interval: 5s

  - platform: adc
    pin: GPIO10
    id: battery_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: "voltage"
    entity_category: "diagnostic"
    disabled_by_default: true
    update_interval: 5s
    attenuation: auto
    filters:
      - multiply: 4.11

  - platform: copy
    id: battery_percent
    source_id: battery_voltage
    name: "Battery level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: "battery"
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: lbl_battery_pct
          text:
            format: "з”өйҮҸ: %.0f%%"
            args: [ 'x' ]
    filters:
      - lambda: return (x - 2.7) / (4.2 - 2.7) * 100;
      - clamp:
          min_value: 0
          max_value: 100

  - platform: copy
    source_id: battery_voltage
    id: battery_voltage_copy
    name: "Battery Voltage Display"
    internal: true
    accuracy_decimals: 2
    on_value:
      - lvgl.label.update:
          id: lbl_voltage
          text:
            format: "з”өеҺӢ: %.2fV"
            args: [ 'x' ]

  - platform: wifi_signal
    name: "WiFi db"
    id: wifi_signal_db
    update_interval: 30s

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal"
    id: wifi_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"

i2c:
  - id: bus_a
    scl: GPIO18
    sda: GPIO8
  - id: bus_b
    sda: GPIO41
    scl: GPIO40

spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    i2c_id: bus_a
    address: 0x5D
    id: gt911_touchscreen
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true

# ========== LVGL й…ҚзҪ® ==========
lvgl:
  displays:
    - s3_box_lcd
  touchscreens:
    - gt911_touchscreen
  byte_order: little_endian
  buffer_size: 25%
  default_font: cn_font

  # е…ЁеұҖй»‘иүІиғҢжҷҜ
  bottom_layer:
    bg_color: 0x000000

  pages:
    # ===== йЎөйқў 1пјҡзҺҜеўғ =====
    - id: page_env
      bg_color: 0x000000
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            border_width: 0
            pad_bottom: 50px
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 24px
            widgets:
              - label:
                  id: lbl_temp
                  text: "жё©еәҰ: --.-в„ғ"
                  text_font: cn_font
                  text_color: 0xFFFFFF
              - label:
                  id: lbl_humi
                  text: "ж№ҝеәҰ: --.-%%"
                  text_font: cn_font
                  text_color: 0xFFFFFF

    # ===== йЎөйқў 2пјҡз”өжұ  =====
    - id: page_battery
      bg_color: 0x000000
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            border_width: 0
            pad_bottom: 50px
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              pad_row: 24px
            widgets:
              - label:
                  id: lbl_voltage
                  text: "з”өеҺӢ: --.--V"
                  text_font: cn_font
                  text_color: 0xFFFFFF
              - label:
                  id: lbl_battery_pct
                  text: "з”өйҮҸ: --%%"
                  text_font: cn_font
                  text_color: 0xFFFFFF

  # ===== еә•йғЁеҜјиҲӘж ҸпјҲе§Ӣз»ҲзҪ®йЎ¶пјү=====
  top_layer:
    bg_color: 0x000000
    bg_opa: cover
    layout:
      type: flex
      flex_flow: ROW
      flex_align_main: SPACE_EVENLY
      flex_align_cross: CENTER
      pad_all: 0px
    widgets:
      - button:
          id: btn_tab_env
          width: 140px
          height: 40px
          bg_color: 0x333333
          text_color: 0xFFFFFF
          radius: 4
          text: "зҺҜеўғ"
          text_font: cn_font
          align: CENTER
          on_press:
            - lvgl.page.show: page_env
      - button:
          id: btn_tab_battery
          width: 140px
          height: 40px
          bg_color: 0x1a1a1a
          text_color: 0x888888
          radius: 4
          text: "з”өжұ "
          text_font: cn_font
          align: CENTER
          on_press:
            - lvgl.page.show: page_battery