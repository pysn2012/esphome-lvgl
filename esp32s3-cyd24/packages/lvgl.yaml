lvgl:
  displays:
    - tft_display
  touchscreens:
    - touchscreen_id: tft_touch
  buffer_size: 100%
  # =====顶层页面=====
  top_layer:
    widgets:    
      # 显示时间（顶部居中）
      - label:
          text: "----/--/-- --:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF

      # 底部导航按键
      - obj:
          align: bottom_mid
          width: 100%
          height: 55
          bg_color: Black
          bg_opa: cover
          pad_all: 4
          border_width: 0
          layout:
            type: flex
            flex_flow: row
            flex_align_main: space_evenly
            flex_align_cross: center
          widgets:
            - button:
                height: 45px
                width: 45px
                radius: $radius
                styles: control
                widgets:
                  - label:
                      text_font: $icon_font
                      align: center
                      text: $homeicon
                on_click:
                  - lvgl.page.show: main_page
            - button:
                height: 45px
                width: 45px
                radius: $radius
                styles: control
                widgets:
                  - label:
                      text_font: $icon_font
                      align: center
                      text: $lightbulb
                on_click:
                  - lvgl.page.show: light_page
            - button:
                height: 45px
                width: 45px
                radius: $radius
                styles: control
                widgets:
                  - label:
                      text_font: $icon_font
                      align: center
                      text: $socket
                on_click:
                  - lvgl.page.show: socket_page
            - button:
                height: 45px
                width: 45px
                radius: $radius
                styles: control
                widgets:
                  - label:
                      text_font: $icon_font
                      align: center
                      text: $wifi
                on_click:
                  - lvgl.page.show: network_page
          
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column
        flex_align_main: start        # 主轴：从顶部开始排列
        flex_align_cross: stretch     # 交叉轴：子元素宽度拉伸填满
        flex_align_track: start
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 36
      pad_bottom: 60
      pad_left: 10
      pad_right: 5
      
      widgets:        
        # 中部信息区 - 纯文字，无容器无底色
        - label:
            id: outdoor_info
            text: "室外：--℃/--%"
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: left
            pad_top: 20
            pad_bottom: 6
        - label:
            id: air_info
            text: "--hPa/--PPM"
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: left
            pad_top: 6
            pad_bottom: 6
        - label:
            id: weather_alert_text
            text: "预警：加载中..."
            text_color: 0xFF8C00
            text_font: cn_font
            text_align: left
            long_mode: wrap
            pad_top: 6
            pad_bottom: 6
        - label:
            id: indoor_info
            text: "室内：--℃/--%"
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: left
            pad_top: 6
            pad_bottom: 10

    # ===== 灯光页（屏幕亮度控制）=====
    - id: light_page
      layout:
        type: flex
        flex_flow: column
        flex_align_main: center
        flex_align_cross: center
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 36
      pad_bottom: 60
      pad_left: 10
      pad_right: 10

      widgets:
        - arc:
            id: brightness_arc
            width: 180
            height: 180
            min_value: 0
            max_value: 100
            value: 80
            start_angle: 135
            end_angle: 45
            bg_color: 0x333333
            indicator:
              color: 0xFF8C00        # 进度条颜色
            knob:
              color: 0xFFFFFF        # 拖动圆钮颜色
            on_value:
              then:
                - light.turn_on:
                    id: backlight
                    brightness: !lambda |-
                      return x / 100.0;

    # 插座页面
    - id: socket_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1)]
        grid_rows: [fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 60
      pad_left: 5
      pad_right: 5

      widgets:
       # 按钮：插座1
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket1_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket1_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket1_label
                  text: "插座1"
                  text_font: cn_font
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1

        # 按钮：插座2
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket2_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket2_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket2_label
                  text: "插座2"
                  text_font: cn_font
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1

        # 按钮：插座3
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket3_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket3_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket3_label
                  text: "插座3"
                  text_font: cn_font
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1

    # ===== 网络页 =====
    - id: network_page
      layout:
        type: flex
        flex_flow: column
        flex_align_main: start
        flex_align_cross: stretch
        flex_align_track: start
      scrollbar_mode: "off"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 36
      pad_bottom: 60
      pad_left: 10
      pad_right: 5

      widgets:
        - label:
            id: network_ip
            text: "IP: 获取中..."
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: left
            pad_top: 20
            pad_bottom: 6
        - label:
            id: network_wifi
            text: "WiFi: --dB/--%"
            text_color: 0xFFFFFF
            text_font: cn_font
            text_align: left
            pad_top: 6
            pad_bottom: 20

