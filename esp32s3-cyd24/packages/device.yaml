esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: true

ota:
  platform: esphome

api:

logger:

psram:
  mode: octal
  speed: 80MHz

# 屏幕背光控制 (GPIO47)
# - frequency: 150Hz PWM 频率（足够高以避免闪烁）
# - min_power: 最低亮度级别（1% — 防止完全熄灭）
# - zero_means_zero: 当设为 0 时，背光完全关闭
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO4

# 屏幕背光配置
light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    internal: true

# SPI总线
spi:
  - id: lcd_spi
    clk_pin: GPIO18
    mosi_pin: GPIO17
    miso_pin: GPIO16

# 触摸屏 (xpt2046)
touchscreen:
  - platform: xpt2046
    id: tft_touch
    spi_id: lcd_spi
    cs_pin: 5
    interrupt_pin: 8
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    calibration:
      x_min: 600
      x_max: 3450
      y_min: 1350
      y_max: 4096


# 显示屏(ILI9341)
display:
  - platform: mipi_spi
    id: tft_display
    model: ILI9341
    spi_id: lcd_spi
    invert_colors: false
    cs_pin: 14
    dc_pin: 13
    reset_pin: 15
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 320
      height: 240
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false