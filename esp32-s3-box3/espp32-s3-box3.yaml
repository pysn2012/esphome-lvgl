# ESP32-S3-BOX-3
substitutions:
  name: "your-device-name"
  friendly_name: "Your Room Sensor"
  room: "Your Room"

# Wifi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# 导入组件
packages:
  device: !include packages/device.yaml
  sensors: !include packages/sensors.yaml
  lvgl: !include packages/lvgl.yaml
  backlight: !include packages/backlight.yaml
  time: !include packages/time.yaml
  network: !include packages/network.yaml
  fonts: !include packages/fonts.yaml
  icons: !include packages/icons.yaml
  button: !include packages/button.yaml